upstream app {
  server unix:///var/www/civic/current/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  server_name civicdb.org 34.212.181.17;
  root /var/www/civic/current/public;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  location ~ /downloads/ {

    allow all;

    try_files $uri $uri/ =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = / {
    try_files /index.html =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /index.html {
    try_files /index.html =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location ~* "\.[0-9a-f]{8,}\.(?:js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot|wasm)$" {
    try_files $uri =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* "\.(?:js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot|wasm|webmanifest|xml|txt)$" {
    try_files $uri =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
  }

  location /cable {
    proxy_pass http://app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location ~ /api/(graphql|sign_out|status|upload_profile_image|auth|graphiql|download_table) {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ~ ^/(mcp-chat|curation-chat|chats/?).* {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  error_page 410 /api_notice.html;

  location ~ /api/ {
    return 410;
  }

  location ^~ /links/ {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /jobs {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /rails/ {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /admin/ {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /errors/ {
    proxy_pass http://app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on; # Optional
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /assets/ {
    try_files $uri =404;
    gzip_static on;
    expires off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~ /data-clients {
    return 301 https://civic.readthedocs.io/en/latest/about/data-clients.html;
  }

  location ~ /evidence-score {
    return 301 https://civic.readthedocs.io/en/latest/model/molecular_profiles/evidence_score.html;
  }

  location / {
    try_files $uri $uri/ @index;
    gzip_static on;
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location @index {
    try_files /index.html =404;
    expires off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  client_max_body_size 4G;
  keepalive_timeout 10;

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/civicdb.org/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/civicdb.org/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
  server_name www.civicdb.org;
  return 301 $scheme://civicdb.org$request_uri;

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/civicdb.org/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/civicdb.org/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
  if ($host = civicdb.org) {
    return 301 https://$host$request_uri;
  } # managed by Certbot

  server_name civicdb.org 34.212.181.17;
  listen 80;
  return 404; # managed by Certbot
}

server {
  if ($host = www.civicdb.org) {
    return 301 https://$host$request_uri;
  } # managed by Certbot

  server_name www.civicdb.org;
  listen 80;
  return 404; # managed by Certbot
}

