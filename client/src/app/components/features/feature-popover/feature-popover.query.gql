query FeaturePopover($featureId: Int!) {
  feature(id: $featureId) {
    ...featurePopover
  }
}

fragment featurePopover on Feature {
  id
  name
  fullName
  featureInstance {
    __typename
  }
  featureAliases
  revisions(status: NEW) {
    totalCount
  }
  comments {
    totalCount
  }
  flags(state: OPEN) {
    totalCount
  }
  stats {
    variantCount
    molecularProfileCount
    evidenceItemCount
    assertionCount
  }
}
