<nz-alert
  nzType="warning"
  [nzMessage]="approvalMessageTemplate"
  [nzIcon]="approvalIconTemplate"
  [nzAction]="
    approval().status === 'REQUIRES_REVIEW'
      ? underReviewNotice
      : approvalActionTemplate
  "></nz-alert>
<ng-template #approvalIconTemplate>
  <span style="color: {{ this.color() }}; font-size: 24px">
    <i
      nz-icon
      nzType="safety-certificate"
      nzTheme="fill">
    </i>
  </span>
</ng-template>
<ng-template #approvalMessageTemplate>
  @if (showStars()) {
    <span
      nz-tooltip
      [nzTooltipTitle]="starTooltip">
      <nz-rate
        [nzCount]="starRating()"
        nzDisabled
        [ngModel]="starRating()" />
    </span>
    <ng-template #starTooltip>
      {{ approval().organization.name }} is a {{ starRating() }} star ClinVar
      submitter.
    </ng-template>
  }
  Classification approved by
  <strong>{{ this.isApprovedVcep() ? 'ClinGen Expert Panel ' : ' ' }}</strong>
  <cvc-organization-tag [org]="approval().organization"></cvc-organization-tag>
</ng-template>
<ng-template #approvalActionTemplate>
  <span
    nz-typography
    nzType="secondary">
    ({{ approval().lastReviewed | date: 'mediumDate' }})
  </span>
</ng-template>
<ng-template #underReviewNotice>
  <nz-tag nzColor="blue">
    <i
      nz-icon
      nzType="info-circle"
      nzTheme="fill">
    </i>
    Under review
  </nz-tag>
</ng-template>
