<cvc-news-item-list
  [items]="newsItems()"
  [loading]="loading()"
  [errorMessage]="errorMessage()"
  (retry)="retryNewsItems()">
</cvc-news-item-list>

@if (!loading() && !errorMessage()) {
  <a
    class="all-news-link"
    nz-button
    nzType="default"
    nzSize="small"
    nzBlock
    routerLink="/news">
    See All News & Events
  </a>
}
