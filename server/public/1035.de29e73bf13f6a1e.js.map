<ng-container *ngrxLet="viewer$ as viewer">
  <nz-spin [nzSpinning]="isSubmitting">
    <button
      *ngIf="viewer.canModerate"
      nzType="primary"
      nzSize="large"
      nz-button
      (click)="
        moderate(
          entityType === 'Assertion'
            ? assertionStatuses.Accepted
            : evidenceStatuses.Accepted
        )
      "
      nz-tooltip
      [nzTooltipTrigger]="viewer.mostRecentOrg ? 'hover' : null"
      [nzTooltipTitle]="'For ' + viewer.mostRecentOrg?.name">
      Accept {{ entityTypeDisplay }}
    </button>
    &nbsp;
    <button
      nzDanger
      nzType="primary"
      nzSize="large"
      nz-button
      (click)="
        moderate(
          entityType === 'Assertion'
            ? assertionStatuses.Rejected
            : evidenceStatuses.Rejected
        )
      "
      nz-tooltip
      [nzTooltipTrigger]="viewer.mostRecentOrg ? 'hover' : null"
      [nzTooltipTitle]="'For ' + viewer.mostRecentOrg?.name">
      Reject {{ entityTypeDisplay }}
    </button>
  </nz-spin>
</ng-container>

<ng-template
  #confirmModal
  let-data>
  <nz-space nzDirection="vertical">
    @if (data.organization) {
      <span
        *nzSpaceItem
        nz-typography>
        You will be {{ data.action.toLowerCase() }}ing this
        {{ entityTypeDisplay }} on behalf of
        <strong> {{ data.organization }}</strong> .</span
      >
    }
    @if (data.action == 'Reject') {
      <textarea
        *nzSpaceItem
        [(ngModel)]="confirmationComment"
        nz-input
        rows="4"
        placeholder="Please provide a reason for rejection."></textarea>
    }
  </nz-space>
</ng-template>
