<cvc-section-navigation></cvc-section-navigation>
<nz-page-header class="site-page-header">
  <!--content-->
  <nz-page-header-content>
    <!-- title, description, docs links -->
    <nz-row class="header-content">
      <nz-col
        nzFlex="64px"
        class="header-icon">
        <i
          nz-icon
          nzTheme="twotone"
          [nzTwotoneColor]="'Organization' | entityColor"
          nzType="civic-organization"></i>
      </nz-col>
      <nz-col
        nzFlex="600px"
        class="header-description">
        <h2>Organizations</h2>
        <p
          nz-typography
          nzEllipsis
          nzExpandable
          [nzEllipsisRows]="2">
          Users may be included in Organizations, primarily in order to keep
          track of an organization’s contributions to CIViC curation. A User’s
          organization affiliation is displayed in their profile and user card.
        </p>
      </nz-col>
      <nz-col
        nzFlex="auto"
        class="header-links">
        <nz-space
          nzDirection="vertical"
          class="docs-buttons">
          <a
            nz-button
            href="https://civic.readthedocs.io/en/latest/using/organizations.html"
            target="_blank"
            nzSize="small"
            nzBlock
            *nzSpaceItem>
            <i
              nz-icon
              nzType="link"
              nzTheme="outline"></i>
            View Organization Docs
          </a>
        </nz-space>
      </nz-col>
    </nz-row>
    <nz-row [nzGutter]="[8, 16]">
      <nz-col nzSpan="24">
        <cvc-organization-leaderboards></cvc-organization-leaderboards>
      </nz-col>
      <nz-col [nzSpan]="24">
        <div class="content">
          <cvc-organizations-table
            cvcTitle="Browse Organizations"></cvc-organizations-table>
        </div>
      </nz-col>
    </nz-row>
  </nz-page-header-content>
</nz-page-header>
