<div id="popover-content">
  <ng-container *ngIf="flag$ | ngrxPush as f">
    <nz-card
      [nzTitle]="cardTitle"
      [nzExtra]="subject"
      nzBordered="false"
      id="card-content">
      <ng-template #cardTitle>
        <nz-space class="flag-card-title">
          <span *nzSpaceItem>
            <i
              nz-icon
              nzTheme="twotone"
              nzType="civic-flag"
              [nzTwotoneColor]="'Flag' | entityColor"></i>
            FID{{ f.id }}
          </span>
          <cvc-status-tag
            [status]="f.state"
            *nzSpaceItem></cvc-status-tag>
        </nz-space>
      </ng-template>

      <ng-template #subject>
        @switch (f.flaggable.__typename) {
          @case ('Feature') {
            <cvc-feature-tag
              [enablePopover]="false"
              [feature]="f.flaggable"></cvc-feature-tag>
          }
          @case ('Assertion') {
            <cvc-assertion-tag
              [enablePopover]="false"
              [assertion]="{
                id: f.flaggable.id,
                name: f.flaggable.name,
                link: f.flaggable.link,
                flagged: f.flaggable.flagged,
                status: f.flaggable.assertionStatus,
              }"></cvc-assertion-tag>
          }
          @case ('EvidenceItem') {
            <cvc-evidence-tag
              [enablePopover]="false"
              [evidence]="{
                id: f.flaggable.id,
                name: f.flaggable.name,
                link: f.flaggable.link,
                flagged: f.flaggable.flagged,
                status: f.flaggable.evidenceStatus,
              }"></cvc-evidence-tag>
          }
          @case ('Variant') {
            <cvc-feature-variant-tag
              [enablePopover]="false"
              [variant]="f.flaggable"></cvc-feature-variant-tag>
          }
          @case ('VariantGroup') {
            <cvc-variant-group-tag
              [enablePopover]="false"
              [variantgroup]="f.flaggable"></cvc-variant-group-tag>
          }
          @default {
            <span *ngSwitchDefault>{{ f.flaggable.name }}</span>
          }
        }
      </ng-template>

      <nz-space
        nzDirection="vertical"
        style="width: 100%">
        <nz-descriptions
          *nzSpaceItem
          nzBordered
          [nzColumn]="1"
          nzSize="small">
          <nz-descriptions-item nzTitle="Flagging User">
            <cvc-user-tag
              [enablePopover]="false"
              [user]="f.flaggingUser"></cvc-user-tag>
          </nz-descriptions-item>
          <nz-descriptions-item nzTitle="Flagging Date">
            {{ f.createdAt | timeAgo }}
          </nz-descriptions-item>
        </nz-descriptions>

        <nz-descriptions
          *nzSpaceItem
          nzBordered
          [nzColumn]="1"
          nzSize="small"
          nzLayout="vertical">
          <nz-descriptions-item nzTitle="Comment">
            <cvc-comment-body [commentBodySegments]="f.openActivity.parsedNote"></cvc-comment-body>
          </nz-descriptions-item>
        </nz-descriptions>
      </nz-space>
    </nz-card>
  </ng-container>
</div>
